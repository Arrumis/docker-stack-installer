# 旧稼働コンテナのデータを読めるようにする、親リポジトリ管理の追加 Compose 設定です。
# 既存 PostgreSQL データは PGDATA=/var/lib/postgresql/data で作られているため、
# /pgdata サブディレクトリへ変えると空データベース扱いになり、旧アカウントが見えなくなります。
# app / updater / web-nginx の旧 cthulhoo image は現在 pull できないため、
# イメージだけは公式案内の supahgreg 系をサービス用リポジトリ側から使います。
services:
  db:
    environment:
      PGDATA: /var/lib/postgresql/data
