name: 公開URL確認

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      root_host:
        description: "WordPress を表示するメインホスト名"
        required: true
        default: "sample.com"
      ttrss_host:
        description: "ttrss のホスト名"
        required: true
        default: "ttrss.sample.com"
      munin_host:
        description: "Munin のホスト名"
        required: true
        default: "munin.sample.com"
      tategaki_host:
        description: "tategaki のホスト名"
        required: true
        default: "tategaki.sample.com"
      syncthing_host:
        description: "Syncthing のホスト名"
        required: true
        default: "syncthing.sample.com"
      openvpn_host:
        description: "OpenVPN のホスト名"
        required: true
        default: "openvpn.sample.com"
      traefik_host:
        description: "Traefik 管理画面のホスト名"
        required: true
        default: "traefik.sample.com"
      mirakurun_host:
        description: "Mirakurun のホスト名"
        required: true
        default: "mirakurun.sample.com"
      epgrec_host:
        description: "EPGStation 互換入口のホスト名"
        required: true
        default: "epgrec.sample.com"
      epgstation_host:
        description: "EPGStation のホスト名"
        required: true
        default: "epgstation.sample.com"
      basic_auth_user:
        description: "Basic 認証ユーザー名。不要なら空欄"
        required: false
        default: ""
      basic_auth_password:
        description: "Basic 認証パスワード。不要なら空欄"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: repo を取得
        uses: actions/checkout@v5

      - name: 親 env を準備
        run: |
          cp stack.env.example stack.env.local
          {
            echo "STACK_ROOT=${GITHUB_WORKSPACE}"
            echo "AUTO_ENABLE_HTTPS=1"
          } >> stack.env.local

      - name: proxy env を準備
        run: |
          mkdir -p infra-reverse-proxy
          cat > infra-reverse-proxy/.env.local <<'EOF'
          DOMAIN=sample.com
          ROOT_HOST=${{ inputs.root_host }}
          TTRSS_HOST=${{ inputs.ttrss_host }}
          MUNIN_HOST=${{ inputs.munin_host }}
          TATEGAKI_HOST=${{ inputs.tategaki_host }}
          SYNCTHING_HOST=${{ inputs.syncthing_host }}
          OPENVPN_HOST=${{ inputs.openvpn_host }}
          TRAEFIK_HOST=${{ inputs.traefik_host }}
          MIRAKURUN_HOST=${{ inputs.mirakurun_host }}
          EPGREC_HOST=${{ inputs.epgrec_host }}
          EPGSTATION_HOST=${{ inputs.epgstation_host }}
          BASIC_AUTH_USER=${{ inputs.basic_auth_user }}
          BASIC_AUTH_PASSWORD=${{ inputs.basic_auth_password }}
          EOF

      - name: 公開URLを確認
        run: bash ./scripts/check-public-urls.sh
