name: Public Endpoint Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      root_host:
        description: "Root host to check"
        required: true
        default: "sample.com"
      ttrss_host:
        description: "ttrss host to check"
        required: true
        default: "ttrss.sample.com"
      munin_host:
        description: "munin host to check"
        required: true
        default: "munin.sample.com"
      tategaki_host:
        description: "tategaki host to check"
        required: true
        default: "tategaki.sample.com"
      syncthing_host:
        description: "syncthing host to check"
        required: true
        default: "syncthing.sample.com"
      openvpn_host:
        description: "openvpn host to check"
        required: true
        default: "openvpn.sample.com"
      traefik_host:
        description: "traefik host to check"
        required: true
        default: "traefik.sample.com"
      mirakurun_host:
        description: "mirakurun host to check"
        required: true
        default: "mirakurun.sample.com"
      epgrec_host:
        description: "epgrec host to check"
        required: true
        default: "epgrec.sample.com"
      epgstation_host:
        description: "epgstation host to check"
        required: true
        default: "epgstation.sample.com"
      basic_auth_user:
        description: "Optional basic auth user"
        required: false
        default: ""
      basic_auth_password:
        description: "Optional basic auth password"
        required: false
        default: ""

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare stack env
        run: |
          cp stack.env.example stack.env.local
          {
            echo "STACK_ROOT=${GITHUB_WORKSPACE}"
            echo "AUTO_ENABLE_HTTPS=1"
          } >> stack.env.local

      - name: Prepare proxy env
        run: |
          mkdir -p infra-reverse-proxy
          cat > infra-reverse-proxy/.env.local <<'EOF'
          DOMAIN=sample.com
          ROOT_HOST=${{ inputs.root_host }}
          TTRSS_HOST=${{ inputs.ttrss_host }}
          MUNIN_HOST=${{ inputs.munin_host }}
          TATEGAKI_HOST=${{ inputs.tategaki_host }}
          SYNCTHING_HOST=${{ inputs.syncthing_host }}
          OPENVPN_HOST=${{ inputs.openvpn_host }}
          TRAEFIK_HOST=${{ inputs.traefik_host }}
          MIRAKURUN_HOST=${{ inputs.mirakurun_host }}
          EPGREC_HOST=${{ inputs.epgrec_host }}
          EPGSTATION_HOST=${{ inputs.epgstation_host }}
          BASIC_AUTH_USER=${{ inputs.basic_auth_user }}
          BASIC_AUTH_PASSWORD=${{ inputs.basic_auth_password }}
          EOF

      - name: Check public URLs
        run: bash ./scripts/check-public-urls.sh
